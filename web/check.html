<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>speed-camera · capability check</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page-check">
  <h1>speed-camera · capability check</h1>
  <div class="sub" id="ua">user agent…</div>

  <div id="verdict">Running checks…</div>

  <h2>Activity log</h2>
  <pre id="log"></pre>

  <div id="report"></div>

  <h2>Live camera test</h2>
  <p class="detail">The checks above only prove the APIs <em>exist</em>. This opens
  the camera, reports its real resolution, and measures the true frame rate.</p>
  <button id="startCam">Test camera</button>
  <button id="stopCam" disabled>Stop</button>
  <video id="cam" playsinline muted></video>
  <div id="camResult"></div>

  <!-- Load order matters: log.js installs the error handler first, so it can
       still report a parse error in the scripts that follow. -->
  <script src="js/log.js"></script>
  <script src="js/checks.js"></script>
  <script src="js/camera.js"></script>
</body>
</html>
