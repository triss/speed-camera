<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>speed-camera · capability check</title>
  <style>
    :root { color-scheme: dark; }
    body {
      font: 15px/1.5 system-ui, sans-serif;
      margin: 0; padding: 16px;
      background: #111; color: #eee;
      max-width: 760px; margin-inline: auto;
    }
    h1 { font-size: 20px; margin: 0 0 4px; }
    .sub { color: #999; font-size: 13px; margin-bottom: 16px; word-break: break-all; }
    #verdict {
      padding: 12px 14px; border-radius: 8px; font-weight: 600;
      margin-bottom: 18px; border: 1px solid #333;
    }
    .v-ok   { background: #0d2a14; border-color: #1f7a3a; }
    .v-warn { background: #2a230d; border-color: #7a651f; }
    .v-fail { background: #2a0d0d; border-color: #7a1f1f; }
    h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .06em;
         color: #8ab4ff; margin: 22px 0 6px; }
    .row { display: grid; grid-template-columns: 64px 1fr; gap: 10px;
           padding: 8px 0; border-bottom: 1px solid #222; align-items: start; }
    .badge { font-size: 12px; font-weight: 700; text-align: center;
             padding: 3px 0; border-radius: 5px; }
    .pass { background: #14361f; color: #6ee79b; }
    .warn { background: #363014; color: #e7cf6e; }
    .fail { background: #361414; color: #e76e6e; }
    .name { font-weight: 600; }
    .detail { color: #aaa; font-size: 13px; }
    .gates { color: #777; font-size: 12px; margin-top: 2px; }
    button {
      min-height: 44px; padding: 0 16px; margin: 4px 6px 4px 0;
      border: 1px solid #444; border-radius: 7px;
      background: #222; color: #eee; font: inherit; font-weight: 600;
    }
    button:disabled { opacity: .5; }
    #cam { width: 100%; max-height: 50vh; background: #000;
           border: 1px solid #333; border-radius: 8px; margin-top: 10px;
           display: none; }
    #camResult { font-size: 14px; margin-top: 8px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>speed-camera · capability check</h1>
  <div class="sub" id="ua"></div>

  <div id="verdict">Running checks…</div>

  <div id="report"></div>

  <h2>Live camera test</h2>
  <p class="detail">Static checks above only prove the APIs <em>exist</em>. This
  actually opens the camera, reports its real resolution, and measures the true
  frame rate — the number that decides whether on-device speed estimation is viable.</p>
  <button id="startCam">Test camera</button>
  <button id="stopCam" disabled>Stop</button>
  <video id="cam" playsinline muted></video>
  <div id="camResult"></div>

  <script>
    "use strict";

    // Each check: returns { status: "pass"|"warn"|"fail", detail: string }.
    // "critical" failures sink the whole app; others degrade features.
    const CHECKS = [
      { group: "Critical", name: "Secure context",
        gates: "getUserMedia only runs on HTTPS or localhost",
        critical: true,
        run: () => window.isSecureContext
          ? { status: "pass", detail: location.origin }
          : { status: "fail", detail: "insecure context — serve via https:// or http://localhost" } },

      { group: "Critical", name: "getUserMedia (camera)",
        gates: "the entire capture path",
        critical: true,
        run: () => (navigator.mediaDevices && navigator.mediaDevices.getUserMedia)
          ? { status: "pass", detail: "navigator.mediaDevices.getUserMedia present" }
          : { status: "fail", detail: "not available — browser too old or non-secure context" } },

      { group: "Critical", name: "Canvas 2D + getImageData",
        gates: "reading pixels for the CV pipeline",
        critical: true,
        run: () => {
          try {
            const c = document.createElement("canvas");
            const g = c.getContext("2d");
            if (!g) return { status: "fail", detail: "no 2d context" };
            g.getImageData(0, 0, 1, 1);
            return { status: "pass", detail: "pixel access OK" };
          } catch (e) { return { status: "fail", detail: String(e) }; }
        } },

      { group: "Critical", name: "performance.now()",
        gates: "frame timing — speed = metres ÷ seconds depends on it",
        critical: true,
        run: () => (window.performance && typeof performance.now === "function")
          ? { status: "pass", detail: "high-res clock present" }
          : { status: "fail", detail: "missing — timing would be unreliable" } },

      { group: "Critical", name: "requestAnimationFrame",
        gates: "the processing loop",
        critical: true,
        run: () => typeof window.requestAnimationFrame === "function"
          ? { status: "pass", detail: "present" }
          : { status: "fail", detail: "missing" } },

      { group: "Performance", name: "WebAssembly",
        gates: "optional fast CV core (OpenCV.js / Rust/C engine)",
        run: () => (typeof WebAssembly === "object" && typeof WebAssembly.instantiate === "function")
          ? { status: "pass", detail: "WASM available — perf tier open" }
          : { status: "warn", detail: "no WASM — must run pipeline in plain JS" } },

      { group: "Performance", name: "Web Workers",
        gates: "running CV off the UI thread (smoother)",
        run: () => typeof window.Worker === "function"
          ? { status: "pass", detail: "present" }
          : { status: "warn", detail: "no workers — CV runs on main thread" } },

      { group: "Performance", name: "createImageBitmap",
        gates: "efficient zero-copy frame grabs",
        run: () => typeof window.createImageBitmap === "function"
          ? { status: "pass", detail: "present" }
          : { status: "warn", detail: "fall back to canvas drawImage" } },

      { group: "Performance", name: "video.requestVideoFrameCallback",
        gates: "frame-accurate capture + true fps measurement",
        run: () => ("requestVideoFrameCallback" in HTMLVideoElement.prototype)
          ? { status: "pass", detail: "present — accurate per-frame timing" }
          : { status: "warn", detail: "absent — sample frames via rAF instead" } },

      { group: "Deployment & UX", name: "enumerateDevices",
        gates: "choosing the rear camera",
        run: () => (navigator.mediaDevices && navigator.mediaDevices.enumerateDevices)
          ? { status: "pass", detail: "present" }
          : { status: "warn", detail: "can't enumerate — rely on facingMode hint" } },

      { group: "Deployment & UX", name: "Wake Lock API",
        gates: "keeping the screen awake for an always-on sensor",
        run: () => ("wakeLock" in navigator)
          ? { status: "pass", detail: "present" }
          : { status: "warn", detail: "no wake lock — screen may sleep; needs a workaround" } },

      { group: "Deployment & UX", name: "DeviceOrientation / Motion",
        gates: "the steady-pose probe (web port of stable_capture.py)",
        run: () => ("DeviceMotionEvent" in window || "DeviceOrientationEvent" in window)
          ? { status: "pass", detail: "motion sensors exposed (may need a permission prompt on iOS)" }
          : { status: "warn", detail: "no motion sensors — calibrate stability visually" } },

      { group: "Deployment & UX", name: "Clipboard write",
        gates: "exporting calibration JSON",
        run: () => (navigator.clipboard && navigator.clipboard.writeText)
          ? { status: "pass", detail: "present" }
          : { status: "warn", detail: "fall back to a textarea copy" } },

      { group: "Deployment & UX", name: "localStorage",
        gates: "persisting calibration between sessions",
        run: () => {
          try { localStorage.setItem("__sc", "1"); localStorage.removeItem("__sc");
            return { status: "pass", detail: "present" }; }
          catch (e) { return { status: "warn", detail: "unavailable (private mode?)" }; }
        } },
    ];

    function render() {
      document.getElementById("ua").textContent = navigator.userAgent;
      const report = document.getElementById("report");
      const groups = {};
      let criticalFail = false, anyWarn = false;

      for (const chk of CHECKS) {
        let res;
        try { res = chk.run(); }
        catch (e) { res = { status: "fail", detail: "threw: " + e }; }
        if (res.status === "fail" && chk.critical) criticalFail = true;
        if (res.status !== "pass") anyWarn = true;
        (groups[chk.group] ||= []).push({ chk, res });
      }

      for (const [group, items] of Object.entries(groups)) {
        const h = document.createElement("h2");
        h.textContent = group;
        report.append(h);
        for (const { chk, res } of items) {
          const row = document.createElement("div");
          row.className = "row";
          row.innerHTML =
            `<div class="badge ${res.status}">${res.status.toUpperCase()}</div>` +
            `<div><div class="name">${chk.name}</div>` +
            `<div class="detail">${res.detail}</div>` +
            `<div class="gates">gates: ${chk.gates}</div></div>`;
          report.append(row);
        }
      }

      const v = document.getElementById("verdict");
      if (criticalFail) {
        v.className = "v-fail";
        v.textContent = "✗ A critical API is missing — the web app cannot run on this browser as-is.";
      } else if (anyWarn) {
        v.className = "v-warn";
        v.textContent = "✓ Core path works. Some optional features are missing — app runs, degraded.";
      } else {
        v.className = "v-ok";
        v.textContent = "✓ Everything the web app needs is here.";
      }
    }

    // --- live camera test ---
    let stream = null, rafId = 0, rvfcActive = false;
    const video = document.getElementById("cam");
    const out = document.getElementById("camResult");

    async function startCam() {
      out.textContent = "requesting camera…";
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } }, audio: false,
        });
      } catch (e) {
        out.textContent = "camera failed: " + e.name + " — " + e.message;
        return;
      }
      video.srcObject = stream;
      video.style.display = "block";
      await video.play().catch(() => {});
      document.getElementById("startCam").disabled = true;
      document.getElementById("stopCam").disabled = false;

      const track = stream.getVideoTracks()[0];
      const s = track.getSettings ? track.getSettings() : {};
      measureFps((fps) => {
        out.textContent =
          `resolution: ${video.videoWidth}×${video.videoHeight}\n` +
          `camera:     ${s.facingMode || "?"} ${s.deviceId ? "(" + s.deviceId.slice(0, 8) + "…)" : ""}\n` +
          `reported:   ${s.frameRate ? s.frameRate.toFixed(1) + " fps (track)" : "n/a"}\n` +
          `measured:   ${fps.toFixed(1)} fps over ~2s\n\n` +
          (fps >= 12
            ? "→ adequate frame rate for speed estimation."
            : "→ low frame rate; speed accuracy for fast objects will suffer.");
      });
    }

    function measureFps(done) {
      let frames = 0;
      const start = performance.now();
      const useRvfc = "requestVideoFrameCallback" in HTMLVideoElement.prototype;

      function tickRvfc() {
        frames++;
        if (performance.now() - start >= 2000) {
          rvfcActive = false;
          done(frames / ((performance.now() - start) / 1000));
        } else { video.requestVideoFrameCallback(tickRvfc); }
      }
      function tickRaf() {
        frames++;
        if (performance.now() - start >= 2000) {
          done(frames / ((performance.now() - start) / 1000));
        } else { rafId = requestAnimationFrame(tickRaf); }
      }
      if (useRvfc) { rvfcActive = true; video.requestVideoFrameCallback(tickRvfc); }
      else { rafId = requestAnimationFrame(tickRaf); }
    }

    function stopCam() {
      if (rafId) cancelAnimationFrame(rafId);
      if (stream) stream.getTracks().forEach((t) => t.stop());
      stream = null;
      video.style.display = "none";
      document.getElementById("startCam").disabled = false;
      document.getElementById("stopCam").disabled = true;
    }

    document.getElementById("startCam").addEventListener("click", startCam);
    document.getElementById("stopCam").addEventListener("click", stopCam);

    render();
  </script>
</body>
</html>
