<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>speed-camera</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page-app">
  <h1>speed-camera 🦄</h1>

  <div id="stage">
    <video id="video" playsinline muted></video>
    <canvas id="overlay"></canvas>
  </div>

  <div class="controls">
    <button id="start">Start camera</button>
    <button id="stop" disabled>Stop</button>
  </div>
  <div id="status">Idle. New here? Run the <a href="check.html">capability check</a> first.</div>

  <p class="note">
    Scaffold only. Capture → pixels → overlay loop is live (the bar shows frame-to-frame
    motion as proof of life). The real pipeline stages are stubs.
  </p>

  <script type="module" src="js/app.js"></script>
</body>
</html>
